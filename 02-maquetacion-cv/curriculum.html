<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currículum | Kabi</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<section id="curriculum">

    <div class="cv-container">

        <div class="section-header">
            <img src="portada-curriculum.png" alt="Portada Curriculum">
        </div>

        <div class="cv-grid">

            <!-- EDUCACIÓN -->
            <div class="cv-card educacion">
                <h3>Educación</h3>

                <p class="cv-title">Universidad Autónoma del Carmen</p>
                <span class="cv-sub">Ing. Diseño Multimedia</span>
                <span class="cv-date">2024 - Presente</span>

                <p class="cv-title">Preparatorio Abierta (Instituto México Global)</p>
                <span class="cv-sub">Informática</span>
                <span class="cv-date">2022 - 2023</span>
            </div>

            <!-- SKILLS -->
            <div class="cv-card skills-card skills">
                <h3>Skills</h3>

                <div class="skills-list">
                    <span>Creativa</span>
                    <span>Organización</span>
                    <span>Trabajo en equipo</span>
                    <span>Comunicación</span>
                    <span>Responsable</span>
                    <span>Adaptabilidad</span>
                </div>
            </div>

            <!-- SOFTWARES -->
            <div class="cv-card softwares-card softwares">
                <h3>Softwares</h3>

                <div class="software-icons">
                    <img src="canva-icon.png" alt="Canva">
                    <img src="medibang.png" alt="Medibang">
                    <img src="capcut.jpg" alt="CapCut">
                    <img src="blender-icon.png" alt="Blender">
                    <img src="office.png" alt="Office">
                </div>
            </div>

        </div>

        <div class="cv-btn">
            <a href="index.html" class="btn">Volver</a>
            <a href="portafolio.html" class="btn">Portafolio</a>
        </div>

    </div>

</section>

</body>
</html>
