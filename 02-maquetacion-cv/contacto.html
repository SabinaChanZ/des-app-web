<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Kabi</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<nav class="nav-bar">
    <div class="nav">
        <a href="index.html" class="btn">Inicio</a>
        <a href="portafolio.html" class="btn">Portafolio</a>
        <a href="curriculum.html" class="btn">Curriculum</a>
        <a href="contacto.html" class="btn">Contacto</a>
    </div>
</nav>

<section class="contacto-section">

    <div class="contacto-container">

        <div class="contacto-info">
            <h2>Contacto</h2>

            <p>
                Si deseas ponerte en contacto conmigo, puedes encontrarme en mis redes
                o enviarme un correo. Responderé lo antes posible. ¡Gracias por tu
                interés en mi trabajo!
            </p>

            <div class="icons">
                <a href="https://www.instagram.com/ourkabi/" target="_blank">
                    <i class="fa-brands fa-instagram"></i>
                </a>

                <a href="mailto:kathezetina@gmail.com">
                    <i class="fa-solid fa-envelope"></i>
                </a>
            </div>
        </div>

        <div class="contacto-form">
            <form action="https://formspree.io/f/mjgjbdpy" method="POST">

                <input type="text" name="nombre" placeholder="Nombre" required>

                <input type="email" name="correo" placeholder="Correo electrónico" required>

                <textarea name="mensaje" placeholder="Mensaje" rows="5" required></textarea>

                <button type="submit" class="btn">Enviar</button>

            </form>
        </div>

    </div>

    <div class="back-btn">
        <a href="index.html" class="btn">Volver</a>
    </div>

</section>

</body>
</html>
